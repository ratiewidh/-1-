<!doctype html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Morning Y Market Radar</title>

  <meta name="theme-color" content="#020617" />

  <style>

    :root{

      --bg:#020617;

      --card:#111827;

      --border:#1f2937;

      --text:#f8fafc;

      --muted:#cbd5e1;

      --green:#10b981;

      --green-dark:#059669;

      --red:#ef4444;

      --button:#1e293b;

    }

    * { box-sizing: border-box; }

    body {

      margin: 0;

      background: var(--bg);

      color: var(--text);

      font-family: Arial, sans-serif;

      padding: 20px;

    }

    .wrap {

      max-width: 760px;

      margin: 0 auto;

    }

    h1 {

      margin: 0 0 18px;

      font-size: 34px;

      font-weight: 800;

      line-height: 1.1;

    }

    .card {

      background: var(--card);

      border: 1px solid var(--border);

      border-radius: 28px;

      padding: 26px;

      margin-bottom: 20px;

      box-shadow: 0 10px 24px rgba(0,0,0,.22);

    }

    .label {

      font-size: 20px;

      color: var(--muted);

      margin-bottom: 14px;

    }

    .price {

      font-size: 38px;

      font-weight: 800;

      line-height: 1.15;

      word-break: break-word;

    }

    .change {

      margin-top: 14px;

      font-size: 18px;

      font-weight: 700;

    }

    .up { color: var(--green); }

    .down { color: var(--red); }

    .neutral { color: var(--muted); }

    .btns, .tabs {

      display: grid;

      gap: 14px;

      margin-bottom: 18px;

    }

    .btns { grid-template-columns: 1fr 1fr; }

    .tabs { grid-template-columns: 1fr 1fr 1fr; }

    button {

      border: none;

      border-radius: 22px;

      min-height: 58px;

      font-size: 18px;

      font-weight: 800;

      cursor: pointer;

    }

    .main-btn {

      background: var(--green);

      color: white;

    }

    .main-btn.active {

      background: var(--green-dark);

    }

    .sub-btn {

      background: var(--button);

      color: white;

      border: 1px solid #334155;

    }

    .sub-btn.active {

      background: var(--green);

      border-color: var(--green);

    }

    .news-btn {

      display: block;

      width: 100%;

      background: var(--button);

      color: white;

      border: 1px solid #334155;

      border-radius: 22px;

      min-height: 78px;

      padding: 18px;

      margin-bottom: 14px;

      text-align: center;

      font-size: 18px;

      font-weight: 800;

      text-decoration: none;

      line-height: 1.3;

    }

    @media (min-width: 900px) {

      body { padding: 28px; }

      h1 { font-size: 48px; }

      .label { font-size: 28px; }

      .price { font-size: 56px; }

      .change { font-size: 24px; }

      button { min-height: 72px; font-size: 28px; }

      .news-btn { min-height: 88px; font-size: 24px; }

    }

  </style>

</head>

<body>

  <div class="wrap">

    <h1>Morning Y Market Radar</h1>

    <div class="card">

      <div class="label">BTC</div>

      <div id="btcPrice" class="price">불러오는 중...</div>

      <div id="btcChange" class="change neutral">전일 대비 -</div>

    </div>

    <div class="card">

      <div class="label">ETH</div>

      <div id="ethPrice" class="price">불러오는 중...</div>

      <div id="ethChange" class="change neutral">전일 대비 -</div>

    </div>

    <div class="card">

      <div class="label">MSTR</div>

      <div id="mstrPrice" class="price">$171.02</div>

      <div id="mstrChange" class="change neutral">전일 대비 -</div>

    </div>

    <div class="card">

      <div class="label">NASDAQ</div>

      <div id="nasdaqPrice" class="price">$18,450.31</div>

      <div id="nasdaqChange" class="change neutral">전일 대비 -</div>

    </div>

    <div class="card">

      <div class="label">HLB</div>

      <div id="hlbPrice" class="price">60,000원</div>

      <div id="hlbChange" class="change neutral">전일 대비 -</div>

    </div>

    <div class="btns">

      <button class="main-btn" onclick="refreshAll()">새로고침</button>

      <button id="autoBtn" class="main-btn active" onclick="toggleAuto()">자동 새로고침 켜짐</button>

    </div>

    <div class="tabs">

      <button id="tab-coin" class="sub-btn active" onclick="showNews('coin')">코인</button>

      <button id="tab-war" class="sub-btn" onclick="showNews('war')">전쟁</button>

      <button id="tab-market" class="sub-btn" onclick="showNews('market')">시장</button>

    </div>

    <div id="newsArea"></div>

  </div>

  <script>

    let autoOn = true;

    let timer = null;

    const newsSets = {

      coin: [

        ["비트코인 최신뉴스", "https://news.google.com/search?q=%EB%B9%84%ED%8A%B8%EC%BD%94%EC%9D%B8&hl=ko&gl=KR&ceid=KR:ko"],

        ["이더리움 최신뉴스", "https://news.google.com/search?q=%EC%9D%B4%EB%8D%94%EB%A6%AC%EC%9B%80&hl=ko&gl=KR&ceid=KR:ko"],

        ["MSTR 최신뉴스", "https://news.google.com/search?q=MSTR%20MicroStrategy&hl=ko&gl=KR&ceid=KR:ko"]

      ],

      war: [

        ["미국-이란 최신뉴스", "https://news.google.com/search?q=%EB%AF%B8%EA%B5%AD%20%EC%9D%B4%EB%9E%80&hl=ko&gl=KR&ceid=KR:ko"],

        ["중동/유가 최신뉴스", "https://news.google.com/search?q=%EC%A4%91%EB%8F%99%20%EC%9C%A0%EA%B0%80&hl=ko&gl=KR&ceid=KR:ko"],

        ["휴전/협상 최신뉴스", "https://news.google.com/search?q=%ED%9C%B4%EC%A0%84%20%ED%98%91%EC%83%81%20%EC%9D%B4%EB%9E%80&hl=ko&gl=KR&ceid=KR:ko"]

      ],

      market: [

        ["나스닥 최신뉴스", "https://news.google.com/search?q=%EB%82%98%EC%8A%A4%EB%8B%A5&hl=ko&gl=KR&ceid=KR:ko"],

        ["미국 금리 최신뉴스", "https://news.google.com/search?q=%EB%AF%B8%EA%B5%AD%20%EA%B8%88%EB%A6%AC&hl=ko&gl=KR&ceid=KR:ko"],

        ["미국 경제 최신뉴스", "https://news.google.com/search?q=%EB%AF%B8%EA%B5%AD%20%EA%B2%BD%EC%A0%9C&hl=ko&gl=KR&ceid=KR:ko"]

      ]

    };

    function formatKRW(v) {

      return new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 0 }).format(v) + "원";

    }

    function setChange(id, value) {

      const el = document.getElementById(id);

      if (value === null || value === undefined || Number.isNaN(value)) {

        el.textContent = "전일 대비 -";

        el.className = "change neutral";

        return;

      }

      const up = value >= 0;

      el.textContent = `전일 대비 ${value > 0 ? "+" : ""}${value.toFixed(2)}%`;

      el.className = "change " + (up ? "up" : "down");

    }

    async function fetchCoinGecko() {

      const r = await fetch(

        "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=krw&include_24hr_change=true",

        { cache: "no-store" }

      );

      if (!r.ok) throw new Error("CoinGecko fetch failed");

      const d = await r.json();

      return {

        btcPrice: d?.bitcoin?.krw,

        btcChange: d?.bitcoin?.krw_24h_change,

        ethPrice: d?.ethereum?.krw,

        ethChange: d?.ethereum?.krw_24h_change

      };

    }

    function showNews(type) {

      document.getElementById("tab-coin").classList.remove("active");

      document.getElementById("tab-war").classList.remove("active");

      document.getElementById("tab-market").classList.remove("active");

      document.getElementById("tab-" + type).classList.add("active");

      const box = document.getElementById("newsArea");

      box.innerHTML = "";

      newsSets[type].forEach(([label, url]) => {

        const a = document.createElement("a");

        a.className = "news-btn";

        a.textContent = label;

        a.href = url;

        a.target = "_blank";

        a.rel = "noreferrer";

        box.appendChild(a);

      });

    }

    async function refreshAll() {

      try {

        const data = await fetchCoinGecko();

        document.getElementById("btcPrice").textContent =

          data.btcPrice ? formatKRW(data.btcPrice) : "불러오기 실패";

        document.getElementById("ethPrice").textContent =

          data.ethPrice ? formatKRW(data.ethPrice) : "불러오기 실패";

        setChange("btcChange", data.btcChange);

        setChange("ethChange", data.ethChange);

        setChange("mstrChange", null);

        setChange("nasdaqChange", null);

        setChange("hlbChange", null);

      } catch (e) {

        console.error(e);

        document.getElementById("btcPrice").textContent = "불러오기 실패";

        document.getElementById("ethPrice").textContent = "불러오기 실패";

        setChange("btcChange", null);

        setChange("ethChange", null);

      }

    }

    function toggleAuto() {

      autoOn = !autoOn;

      const btn = document.getElementById("autoBtn");

      btn.textContent = autoOn ? "자동 새로고침 켜짐" : "자동 새로고침 꺼짐";

      btn.className = autoOn ? "main-btn active" : "sub-btn";

      if (autoOn) {

        timer = setInterval(refreshAll, 60000);

      } else {

        clearInterval(timer);

      }

    }

    refreshAll();

    showNews("coin");

    timer = setInterval(refreshAll, 60000);

  </script>

</body>

</html>
