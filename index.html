<!doctype html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Morning Y Market Radar</title>

  <style>

    body {

      margin: 0;

      background: #020617;

      color: #f8fafc;

      font-family: Arial, sans-serif;

      padding: 24px;

    }

    .wrap {

      max-width: 720px;

      margin: 0 auto;

    }

    h1 {

      margin: 0 0 14px;

      font-size: 48px;

      font-weight: 800;

    }

    .card {

      background: #111827;

      border: 1px solid #1f2937;

      border-radius: 28px;

      padding: 28px;

      margin-bottom: 22px;

      box-shadow: 0 10px 24px rgba(0,0,0,.22);

    }

    .label {

      font-size: 28px;

      color: #cbd5e1;

      margin-bottom: 14px;

    }

    .price {

      font-size: 56px;

      font-weight: 800;

      line-height: 1.15;

    }

    .change {

      margin-top: 14px;

      font-size: 24px;

      font-weight: 700;

    }

    .up { color: #10b981; }

    .down { color: #ef4444; }

    .btns, .tabs {

      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 16px;

      margin-bottom: 22px;

    }

    .tabs {

      grid-template-columns: 1fr 1fr 1fr;

    }

    button {

      border: none;

      border-radius: 22px;

      min-height: 72px;

      font-size: 30px;

      font-weight: 800;

      cursor: pointer;

    }

    .main-btn {

      background: #10b981;

      color: white;

    }

    .sub-btn {

      background: #1e293b;

      color: white;

      border: 1px solid #334155;

    }

    .news-btn {

      background: #1e293b;

      color: white;

      border: 1px solid #334155;

      min-height: 88px;

      width: 100%;

      margin-bottom: 18px;

      text-align: center;

    }

    @media (max-width: 900px) {

      body { padding: 18px; }

      h1 { font-size: 34px; }

      .label { font-size: 20px; }

      .price { font-size: 38px; }

      .change { font-size: 18px; }

      button { min-height: 56px; font-size: 22px; }

      .news-btn { min-height: 72px; }

    }

  </style>

</head>

<body>

  <div class="wrap">

    <h1>Morning Y Market Radar</h1>

    <div class="card">

      <div class="label">BTC</div>

      <div id="btcPrice" class="price">불러오는 중...</div>

      <div id="btcChange" class="change">전일 대비 -</div>

    </div>

    <div class="card">

      <div class="label">ETH</div>

      <div id="ethPrice" class="price">불러오는 중...</div>

      <div id="ethChange" class="change">전일 대비 -</div>

    </div>

    <div class="card">

      <div class="label">MSTR</div>

      <div id="mstrPrice" class="price">$171.02</div>

      <div id="mstrChange" class="change">전일 대비 -</div>

    </div>

    <div class="card">

      <div class="label">NASDAQ</div>

      <div id="nasdaqPrice" class="price">$18,450.31</div>

      <div id="nasdaqChange" class="change">전일 대비 -</div>

    </div>

    <div class="btns">

      <button class="main-btn" onclick="refreshAll()">새로고침</button>

      <button id="autoBtn" class="main-btn" onclick="toggleAuto()">자동 새로고침 켜짐</button>

    </div>

    <div class="tabs">

      <button class="main-btn" onclick="showNews('coin')">코인</button>

      <button class="sub-btn" onclick="showNews('war')">전쟁</button>

      <button class="sub-btn" onclick="showNews('market')">시장</button>

    </div>

    <div id="newsArea"></div>

  </div>

  <script>

    let autoOn = true;

    let timer = null;

    const newsSets = {

      coin: [

        ["비트코인 최신뉴스", "https://news.google.com/search?q=%EB%B9%84%ED%8A%B8%EC%BD%94%EC%9D%B8&hl=ko&gl=KR&ceid=KR:ko"],

        ["이더리움 최신뉴스", "https://news.google.com/search?q=%EC%9D%B4%EB%8D%94%EB%A6%AC%EC%9B%80&hl=ko&gl=KR&ceid=KR:ko"],

        ["MSTR 최신뉴스", "https://news.google.com/search?q=MSTR%20MicroStrategy&hl=ko&gl=KR&ceid=KR:ko"]

      ],

      war: [

        ["미국-이란 최신뉴스", "https://news.google.com/search?q=%EB%AF%B8%EA%B5%AD%20%EC%9D%B4%EB%9E%80&hl=ko&gl=KR&ceid=KR:ko"],

        ["중동/유가 최신뉴스", "https://news.google.com/search?q=%EC%A4%91%EB%8F%99%20%EC%9C%A0%EA%B0%80&hl=ko&gl=KR&ceid=KR:ko"],

        ["휴전/협상 최신뉴스", "https://news.google.com/search?q=%ED%9C%B4%EC%A0%84%20%ED%98%91%EC%83%81%20%EC%9D%B4%EB%9E%80&hl=ko&gl=KR&ceid=KR:ko"]

      ],

      market: [

        ["나스닥 최신뉴스", "https://news.google.com/search?q=%EB%82%98%EC%8A%A4%EB%8B%A5&hl=ko&gl=KR&ceid=KR:ko"],

        ["미국 금리 최신뉴스", "https://news.google.com/search?q=%EB%AF%B8%EA%B5%AD%20%EA%B8%88%EB%A6%AC&hl=ko&gl=KR&ceid=KR:ko"],

        ["미국 경제 최신뉴스", "https://news.google.com/search?q=%EB%AF%B8%EA%B5%AD%20%EA%B2%BD%EC%A0%9C&hl=ko&gl=KR&ceid=KR:ko"]

      ]

    };

    function formatKRW(v) {

      return new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 0 }).format(v) + "원";

    }

    function setChange(id, value) {

      const el = document.getElementById(id);

      const up = value >= 0;

      el.textContent = `전일 대비 ${value > 0 ? "+" : ""}${value.toFixed(2)}%`;

      el.className = "change " + (up ? "up" : "down");

    }

    async function fetchUpbit(market) {

      const r = await fetch(`https://api.upbit.com/v1/ticker?markets=${market}`);

      const d = await r.json();

      return d[0];

    }

    async function refreshAll() {

      try {

        const btc = await fetchUpbit("KRW-BTC");

        const eth = await fetchUpbit("KRW-ETH");

        document.getElementById("btcPrice").textContent = formatKRW(btc.trade_price);

        document.getElementById("ethPrice").textContent = formatKRW(eth.trade_price);

        setChange("btcChange", btc.signed_change_rate * 100);

        setChange("ethChange", eth.signed_change_rate * 100);

        document.getElementById("mstrChange").textContent = "전일 대비 +0.00%";

        document.getElementById("nasdaqChange").textContent = "전일 대비 +0.00%";

      } catch (e) {

        console.error(e);

      }

    }

    function toggleAuto() {

      autoOn = !autoOn;

      const btn = document.getElementById("autoBtn");

      btn.textContent = autoOn ? "자동 새로고침 켜짐" : "자동 새로고침 꺼짐";

      btn.style.background = autoOn ? "#059669" : "#1e293b";

      if (autoOn) {

        timer = setInterval(refreshAll, 60000);

      } else {

        clearInterval(timer);

      }

    }

    function showNews(type) {

      const box = document.getElementById("newsArea");

      box.innerHTML = "";

      newsSets[type].forEach(([label, url]) => {

        const btn = document.createElement("button");

        btn.className = "news-btn";

        btn.textContent = label;

        btn.onclick = () => window.open(url, "_blank");

        box.appendChild(btn);

      });

    }

    refreshAll();

    showNews("coin");

    timer = setInterval(refreshAll, 60000);

  </script>

</body>

</html>
